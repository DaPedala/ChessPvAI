<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
		<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
		<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
		
		<style>
			/* Force visibility for debugging */
			.chessboard-63fde { width: 100% !important; border: 2px solid red; }
			#board img { display: block !important; opacity: 1 !important; border: 1px solid blue; }
		</style>

		<script>
			// Global listener to catch image load failures
			window.addEventListener('error', function(e) {
				if (e.target.tagName === 'IMG') {
					console.error('[Asset Fail] Could not load piece:', e.target.src);
				}
			}, true);
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
